<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Clientes</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <section class="formulario">
            <form>
                <header>Cadastro de Clientes</header>
                <p>Nome:</p>
                <input type="text" id="nome" required>
                <p>Email:</p>
                <input type="email" id="email" required>
            
                <button type="button" id="add">Cadastrar</button>
            </form>
        </section>

        <section class="lista">
            <h2 id="cadastrados"></h2>
            <ul id="nomEmail">
            
            </ul>

            <input type="text" id="pesquisa" placeholder="Procurar cliente">
            <button id="procurar">Pesquisar</button>
            <ul id="resultado">

            </ul>
        </section>
    </div>
    <script type="module" src="/JS/app.js"></script>
</body>
</html>
